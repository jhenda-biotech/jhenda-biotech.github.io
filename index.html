<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JHEN DA BIOTECH | 禎達行銷顧問</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap');
        :root { --hermes-orange: #FF7700; --target-blue: #356994; }
        body { font-family: 'Noto Sans TC', sans-serif; scroll-behavior: smooth; margin: 0; }

        /* 導覽列 */
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); position: fixed; width: 100%; z-index: 100; border-bottom: 1px solid rgba(53,105,148,0.2); }
        
        /* 1. 封面背景：DNA 結構圖 */
        .hero-bg { 
            background: linear-gradient(rgba(53, 105, 148, 0.85), rgba(15, 23, 42, 0.9)), 
                        url('https://images.unsplash.com/photo-1530213786676-41ad9f7736f6?auto=format&fit=crop&q=80') center/cover; 
            height: 100vh; display: flex; align-items: center; justify-content: center; color: white; text-align: center; 
        }

        /* 2. 視差背景：細胞再生主題影像 */
        .parallax-dna { 
            background-image: url('https://images.unsplash.com/photo-1576086213369-97a306d36557?auto=format&fit=crop&q=80'); 
            height: 480px; 
            background-attachment: fixed; 
            background-position: center; 
            background-size: cover; 
            position: relative;
        }

        /* 組織架構核心修改 - 嚴格保留成功對齊版 */
        .org-chart { display: flex; flex-direction: column; align-items: center; padding: 60px 0; }
        .box { border: 2px solid var(--target-blue); padding: 12px 20px; background: white; min-width: 160px; text-align: center; border-radius: 4px; position: relative; }
        .line-v { width: 2px; height: 40px; background: var(--target-blue); }

        /* 總經理整排往右移動，使 Peter 中心對準 Nancy */
        .manager-container { 
            display: flex; 
            align-items: center; 
            position: relative;
            transform: translateX(110px); 
        }
        .line-h-fred { width: 60px; height: 2px; background: var(--target-blue); }

        .dept-branch-main { width: 2px; height: 40px; background: var(--target-blue); }
        .dept-branch-h { width: 80%; height: 2px; background: var(--target-blue); display: flex; justify-content: space-between; }
        .dept-stub { width: 2px; height: 25px; background: var(--target-blue); }
        .dept-row { display: flex; justify-content: space-between; width: 85%; margin-top: 10px; }
    </style>
</head>
<body>

    <nav class="glass-nav h-20 flex items-center px-6">
        <div class="max-w-7xl mx-auto w-full flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-[#FF7700] rounded-full flex items-center justify-center text-white font-bold">JD</div>
                <div class="font-bold text-xl" style="color: var(--target-blue);">JHEN DA <span style="color: var(--hermes-orange);">BIOTECH</span></div>
            </div>
            <div class="flex items-center space-x-8 font-bold" style="color: var(--target-blue);">
                <a href="#about" data-zh="關於我們" data-en="About Us">關於我們</a>
                <a href="#products" data-zh="產品介紹" data-en="Products">產品介紹</a>
                <a href="#team" data-zh="核心團隊" data-en="Team">核心團隊</a>
                <button onclick="toggleLang()" class="border border-orange-500 text-[#FF7700] px-3 py-1 rounded text-xs hover:bg-[#FF7700] hover:text-white transition">EN / 中文</button>
            </div>
        </div>
    </nav>

    <header class="hero-bg">
        <h1 class="text-5xl md:text-7xl font-bold">
            <span data-zh="開發、代理、經銷" data-en="Develop, Represent, Distribute">開發、代理、經銷</span><br>
            <span style="color: var(--hermes-orange); font-weight: 800;" data-zh="最新醫療科技與產品" data-en="Latest Medical Tech & Products">最新醫療科技與產品</span>
        </h1>
    </header>

    <section id="about" class="py-24" style="background-color: var(--target-blue); color: white; text-align: center;">
        <div class="max-w-4xl mx-auto px-6">
            <h2 class="text-3xl font-bold mb-8 text-white" data-zh="關於我們" data-en="About Us">關於我們</h2>
            <p class="text-xl font-light leading-relaxed" data-zh="我們是以臨床病人醫療需求為優先，作為產品開發基準且以協助臨床醫師治療病人為優先目標。希望透過先進醫療產品，減少病患治療期間的病痛，增進病患生活品質。" data-en="We prioritize clinical medical needs. Through advanced medical products, we seek to reduce patient pain and improve quality of life.">我們是以臨床病人醫療需求為優先，作為產品開發基準且以協助臨床醫師治療病人為優先目標。希望透過先進醫療產品，減少病患治療期間的病痛，增進病患生活品質。</p>
        </div>
    </section>

    <div class="parallax-dna"></div>

    <section id="products" class="py-24 max-w-7xl mx-auto px-6">
        <h2 class="text-3xl font-bold text-center mb-16" style="color: var(--target-blue);" data-zh="核心產品介紹" data-en="Core Products">核心產品介紹</h2>
        <div class="grid md:grid-cols-2 gap-12 text-center">
            <div class="shadow-xl rounded-3xl overflow-hidden border-t-8 border-[#FF7700] bg-white">
                <img src="8.jpg" class="w-full h-auto max-h-[500px] object-contain mx-auto">
                <p class="p-4 font-bold text-slate-700">CID CRE8 EVO</p>
            </div>
            <div class="shadow-xl rounded-3xl overflow-hidden border-t-8 border-[#FF7700] bg-white">
                <img src="bone.jpg" class="w-full h-auto max-h-[500px] object-contain mx-auto">
                <p class="p-4 font-bold text-slate-700">FlexiOss®</p>
            </div>
        </div>
    </section>

<section id="contact" class="py-24 bg-gray-50 border-t border-gray-200">
        <div class="max-w-4xl mx-auto px-6 text-center">
            <h2 class="text-4xl font-bold mb-10" style="color: var(--target-blue);" data-zh="聯絡我們" data-en="Contact Us">聯絡我們</h2>
            <div class="bg-white p-12 rounded-3xl shadow-lg border-2" style="border-color: var(--hermes-orange);">
                <p class="text-gray-500 mb-4 tracking-widest text-sm font-bold" data-zh="電子郵件" data-en="EMAIL ADDRESS">電子郵件 / EMAIL</p>
                <a href="mailto:jdbiotech@jen-da.com.tw" class="text-2xl md:text-3xl font-bold break-all hover:text-orange-600 transition" style="color: var(--target-blue);">
                    jdbiotech@jen-da.com.tw
                </a>
                <div class="mt-8">
                    <a href="mailto:jdbiotech@jen-da.com.tw" class="inline-block px-10 py-4 rounded-full font-bold text-white shadow-md hover:bg-orange-600 transition" style="background-color: var(--hermes-orange);" data-zh="立即來信" data-en="Email Us Now">立即來信</a>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-12" style="background-color: var(--target-blue); color: white; text-align: center;">
        <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center mx-auto mb-4" style="color: var(--target-blue); font-weight: bold;">JD</div>
        <p>© 2026 JHEN DA BIOTECH CO.,LTD. <span data-zh="禎達行銷顧問有限公司" data-en="Jhen Da Biotech">禎達行銷顧問有限公司</span></p>
    </footer>

    <script>
        let isZh = true;
        function toggleLang() {
            isZh = !isZh;
            document.querySelectorAll('[data-zh]').forEach(el => {
                el.innerText = isZh ? el.getAttribute('data-zh') : el.getAttribute('data-en');
            });
        }
    </script>
</body>
</html>
